# OpenAI watchdog configuration
mode: manual
confidence_thresholds:
  default: 0.7
  0dte: 0.75
  moc_imbalance: 0.65
rate_limits:
  prompts_per_minute: 8
model: gpt-5-preview
prompt_templates:
  analysis: templates/watchdog/analysis.j2
  narrative: templates/watchdog/narrative.j2
notifications:
  telegram:
    enabled: true
    chat_id: "${TELEGRAM_WATCHDOG_CHAT_ID}"
