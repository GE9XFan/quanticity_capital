# Module toggles and global runtime settings
modules:
  scheduler: true
  ingestion:
    alpha_vantage: true
    ibkr: false  # enable once IBKR integration tested
  analytics: true
  signals: true
  execution: false  # keep false until paper account configured
  watchdog: true
  social: true
  dashboard_api: true
  observability: true

redis:
  url: redis://localhost:6379/0
  decode_responses: true

postgres:
  dsn: postgresql+asyncpg://quanticity:password@localhost:5432/quanticity
  pool_size: 10
  timeout_seconds: 30

watchdog:
  mode: manual  # switch to autopilot only with explicit approval

logging:
  level: INFO
  config_file: null  # point to custom logging yaml when needed
