# Interactive Brokers connectivity configuration.
connection:
  host: 127.0.0.1
  port: 7497
  client_id_pool:
    - 101
    - 102
    - 103
    - 104
  connect_timeout_seconds: 10
  reconnect_backoff_seconds:
    - 1
    - 5
    - 15
    - 30
    - 60
  heartbeat_seconds: 5

quotes:
  symbols:
    - NVDA
    - AAPL
    - MSFT
    - GOOGL
    - META
    - ORCL
    - AMZN
    - TSLA
    - DIS
    - V
    - COST
    - WMT
    - GE
    - AMD
  snapshot_timeout_seconds: 5
  request:
    market_data_type: 1  # 1=Live, 2=Frozen, 3=Delayed, 4=Delayed-Frozen
  cadence_seconds: 3
  redis:
    key_pattern: "raw:ibkr:quotes:{symbol}"
    heartbeat_pattern: "state:ibkr:quotes:{symbol}"
    ttl_seconds: 6

level2_depth:
  rotation_groups:
    grp1:
      - SPY
      - QQQ
      - IWM
    grp2:
      - NVDA
      - AAPL
      - MSFT
    grp3:
      - GOOGL
      - META
      - ORCL
    grp4:
      - AMZN
      - TSLA
      - DIS
    grp5:
      - V
      - COST
      - WMT
    grp6:
      - GE
      - AMD
  depth_levels: 10
  cadence_seconds: 5
  max_concurrent_symbols: 3
  contract_overrides:
    NVDA:
      exchange: ISLAND
      primary_exchange: NASDAQ
    AAPL:
      exchange: ISLAND
      primary_exchange: NASDAQ
    MSFT:
      exchange: ISLAND
      primary_exchange: NASDAQ
  # request:
  #   market_depth_type: 1  # 1=Live, 2=Frozen, 3=Delayed, 4=Delayed-Frozen
  redis:
    key_pattern: "raw:ibkr:l2:{symbol}"
    heartbeat_pattern: "state:ibkr:l2:{symbol}"
    ttl_seconds: 10

account_bundle:
  summary:
    cadence_seconds: 15
    redis:
      key: "raw:ibkr:account:summary"
      heartbeat: "state:ibkr:account:summary"
      ttl_seconds: 30
  positions:
    cadence_seconds: 15
    redis:
      key: "raw:ibkr:account:positions"
      heartbeat: "state:ibkr:account:positions"
      ttl_seconds: 30
    include_asset_classes:
      - STK
      - OPT
  pnl:
    cadence_seconds: 15
    redis:
      account_key: "raw:ibkr:account:pnl"
      position_pattern: "raw:ibkr:position:pnl:{symbol}"
      heartbeat: "state:ibkr:account:pnl"
      ttl_seconds: 30

executions:
  redis:
    stream: "stream:ibkr:executions"
    maxlen: 5000
    last_key: "raw:ibkr:execution:last"
    heartbeat: "state:ibkr:executions"
  include_commission: true
  include_order_status: true
