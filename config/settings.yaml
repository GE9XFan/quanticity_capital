runtime:
  log_level: INFO
  data_dir: data/
  cache_dir: .cache/

services:
  alphavantage:
    base_url: https://www.alphavantage.co
    api_key_env: ALPHAVANTAGE_API_KEY
    timeout_seconds: 10
  redis:
    url_env: REDIS_URL
    default_ttl_seconds: 3600
    min_ttl_seconds: 60
    max_ttl_seconds: 7776000

features:
  enable_mock_data: false
  enable_backtesting: false

ingestion:
  alpha_vantage:
    enabled_endpoints:
      - REALTIME_OPTIONS
      - TIME_SERIES_INTRADAY
      - VWAP
      - MACD
      - BBANDS
      - TOP_GAINERS_LOSERS
      - NEWS_SENTIMENT
      - REAL_GDP
      - CPI
      - INFLATION
      - TREASURY_YIELD
      - FEDERAL_FUNDS_RATE
      - EARNINGS_CALENDAR
      - EARNINGS_ESTIMATES
      - INCOME_STATEMENT
      - BALANCE_SHEET
      - CASH_FLOW
      - SHARES_OUTSTANDING
      - EARNINGS_CALL_TRANSCRIPT
    endpoints:
      EARNINGS_CALL_TRANSCRIPT:
        contexts:
          - symbol: NVDA
            quarter: 2024Q3
          - symbol: NVDA
            quarter: 2024Q4
          - symbol: AAPL
            quarter: 2024Q4
          - symbol: MSFT
            quarter: 2024Q4
          - symbol: TSLA
            quarter: 2024Q4
          - symbol: NVDA
            quarter: 2025Q1
