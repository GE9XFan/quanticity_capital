# Analytics job definitions consumed by the ingestion scheduler.
defaults:
  cadence_seconds: 10
  enabled: true
jobs:
  - name: refresh_high_frequency
    type: analytics.refresh.high_frequency
    cadence_seconds: 10
    symbols: ["SPY", "QQQ", "IWM"]
    metrics: ["dealer_greeks", "liquidity_snapshot"]
  - name: refresh_macro_daily
    type: analytics.refresh.macro_daily
    enabled: false
    cadence_seconds: 3600
    symbols: ["MACRO"]
    metrics: ["macro_overview"]
  - name: refresh_options_snapshot
    type: analytics.refresh.options_snapshot
    cadence_seconds: 60
    symbols: ["SPY"]
    metrics: ["options_surface", "skew_profile"]
