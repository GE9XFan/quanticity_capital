# Scheduler job definitions aligned with docs/specs/scheduler*.md
buckets:
  av_high_freq:
    capacity: 5
    refill_per_second: 0.8
  av_medium_freq:
    capacity: 3
    refill_per_second: 0.2
  av_news:
    capacity: 1
    refill_per_second: 0.05
  ibkr_market_data:
    capacity: 10
    refill_per_second: 3

jobs:
  av.realtime_options:
    cadence: "*/12 * * * * *"  # every 12 seconds
    jitter_seconds: 2
    bucket: av_high_freq
  av.tech_indicators:
    cadence: "*/60 * * * * *"
    bucket: av_medium_freq
  av.news:
    cadence: "*/600 * * * * *"
    bucket: av_news
  ibkr.l2_rotation:
    cadence: "*/5 * * * * *"
    bucket: ibkr_market_data
  analytics.refresh:
    cadence: "*/10 * * * * *"
    bucket: null
  signals.evaluate:
    cadence: "*/10 * * * * *"
    bucket: null
  watchdog.review:
    cadence: "*/60 * * * * *"
    bucket: null
  social.dispatch:
    cadence: "*/30 * * * * *"
    bucket: null
