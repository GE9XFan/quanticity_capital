contract: report_artifact
version: v1.0.0
summary: Generated report outputs (PDF, HTML, data packets) produced by Layer 8 reporting services.
owners:
  - role: Reporting Lead
    name: Michael Merrick
    contact: michael.merrick@quanticitycapital.com
schema:
  type: object
  required: [artifact_id, timestamp, report_type, format, storage_location]
  properties:
    artifact_id:
      type: string
      description: Unique identifier for the generated report instance.
    timestamp:
      type: string
      format: date-time
    report_type:
      type: string
      description: Report template identifier (e.g., daily_ops, investor_weekly).
    format:
      type: string
      enum: [pdf, html, json]
    storage_location:
      type: string
      description: URL or path to stored artifact.
    checksum:
      type: string
      description: Integrity hash for compliance tracking.
    sections_included:
      type: array
      items:
        type: string
    audience:
      type: string
      enum: [internal_ops, investors, premium_subscribers]
    generation_metrics:
      type: object
      properties:
        duration_ms:
          type: integer
        size_kb:
          type: number
    metadata:
      type: object
      additionalProperties: true
transport:
  format: json
  topic: reporting.artifact
  retention: "7y compliance archive"
validation:
  - name: schema-validation
    tool: scripts/validate_contract.py
  - name: report-sanity
    tool: pytest tests/layer8/test_report_generation.py
    description: Ensure generated artifacts include required sections and metadata.
